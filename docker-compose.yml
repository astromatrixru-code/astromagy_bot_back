version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: astromagy_db
    restart: always
    environment:
      POSTGRES_USER: astromagy_user
      POSTGRES_PASSWORD: astromagy_password
      POSTGRES_DB: astromagy_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: astromagy_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: